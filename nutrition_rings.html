



<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Tracking App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #f8f8f8;
            min-height: 100vh;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            padding: 20px 20px 20px 20px;
        }
        
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 0 10px;
        }


        .card {
            border-radius: 20px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        /* Glowing effects for each card */
        .card.calories {
            background: #0D0D0D;
            color: white;
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                0 0 20px rgba(13, 13, 13, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 12px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card.calories .card-value {
            font-size: 36px;
            margin-bottom: 1px;
        }

        .card.calories .card-subtitle {
            font-size: 10px;
        }

        .card.calories .card-header {
            margin-bottom: 0;
        }

        .card.calories .progress-container {
            width: 110px;
            height: 110px;
        }

        /* Override conflicting styles */
        .card.calories .card-value {
            font-size: 36px !important;
        }

        .card.calories .progress-container {
            width: 110px !important;
            height: 110px !important;
        }

        .card.protein {
            background: #a3bffb;
            color: #1a1a1a;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.1),
                0 0 20px rgba(150, 184, 255, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card.carbs {
            background: #a7ffd7;
            color: #1a1a1a;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.1),
                0 0 20px rgba(167, 199, 150, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card.fats {
            background: #ffcd98;
            color: #1a1a1a;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.1),
                0 0 20px rgba(249, 254, 134, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 16px;
            width: 100%;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            opacity: 0.9;
        }

        .card-value {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 4px;
        }

        .card.calories .card-value {
            font-size: 56px;
        }

        .card-subtitle {
            font-size: 12px;
            font-weight: 400;
            opacity: 0.7;
            text-transform: capitalize;
        }

        .card-content {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
        }

        .card.protein .card-content,
        .card.carbs .card-content,
        .card.fats .card-content {
            justify-content: center;
        }

        .card-value {
            font-size: 48px;
            font-weight: 700;
            line-height: 1;
        }

        .card.calories .card-value {
            font-size: 56px;
        }

        .progress-container {
            position: relative;
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card.calories .progress-container {
            width: 65px;
            height: 65px;
        }

        .progress-ring {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .progress-ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 8;
            stroke-linecap: round;
        }

        .card.protein .progress-ring-bg,
        .card.carbs .progress-ring-bg,
        .card.fats .progress-ring-bg {
            stroke: rgba(0, 0, 0, 0.1);
        }

        .progress-ring-fill {
            fill: none;
            stroke: white;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 0 100;
            transition: stroke-dasharray 1s ease-in-out;
        }

        .card.protein .progress-ring-fill,
        .card.carbs .progress-ring-fill,
        .card.fats .progress-ring-fill {
            stroke: #1a1a1a;
        }

        .small-cards {
            display: flex;
            gap: 20px;
            justify-content: space-between;
        }

        .card.protein,
        .card.carbs,
        .card.fats {
            padding: 20px;
            flex: 1;
        }

        .card.protein .card-value,
        .card.carbs .card-value,
        .card.fats .card-value {
            font-size: 38px;
            text-align: left !important;
            align-self: flex-start !important;
            justify-self: flex-start;
            margin-right: auto;
        }

        /* Responsive design */
        @media (max-width: 480px) {
            .container {
                gap: 12px;
                padding: 0 8px;
                max-width: 100%;
            }
            
            .card {
                padding: 16px;
            }

            .card.calories {
                padding: 12px;
                height: 100px;
            }

            .card.protein,
            .card.fats,
            .card.carbs {
                padding: 12px;
                flex: 1;
                min-width: 0;
                width: 0;
                box-sizing: border-box;
                height: 160px; /* Much taller for full visibility */
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            
            .small-cards {
                display: flex;
                flex-direction: row;
                gap: 8px;
                justify-content: space-between;
                width: 100%;
            }
            
            .card-value {
                font-size: 40px;
            }
            
            .card.calories .card-value {
                font-size: 48px;
            }
            
            .card.protein .card-value,
            .card.carbs .card-value,
            .card.fats .card-value {
                font-size: 28px;
                text-align: left !important;
                align-self: flex-start !important;
                justify-self: flex-start;
                margin-right: auto;
            }
            
            .progress-container {
                width: 70px;
                height: 70px;
            }

            .card.calories .progress-container {
                width: 50px;
                height: 50px;
            }

            .progress-ring-bg,
            .progress-ring-fill {
                stroke-width: 6;
            }

            /* Emoji sizes for mobile - calories 2px bigger */
            .card.protein .ring-emoji,
            .card.fats .ring-emoji,
            .card.carbs .ring-emoji {
                font-size: 24px;
            }

            .card.calories .ring-emoji {
                font-size: 26px;
            }
            
            .input-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }

        /* Start progress rings from top (12 o'clock position) */
        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring-fill {
            transition: stroke-dashoffset 1s ease-out;
        }

        /* Emoji styling inside rings */
        .ring-emoji {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            z-index: 10;
            pointer-events: none;
        }

        /* Emoji for calories ring - 2px bigger than other nutrients */
        .card.calories .ring-emoji {
            font-size: 30px;
        }

        /* Larger emoji for nutrition rings */
        .card.protein .ring-emoji,
        .card.fats .ring-emoji,
        .card.carbs .ring-emoji {
            font-size: 28px;
        }

        /* Protein emoji now same size as other nutrients */
    </style>
</head>
<body>
    <div class="container">
        <!-- Calories Card (Large) -->
        <div class="card calories">
            <div class="card-header">
                <div class="card-value" id="caloriesValue">2199</div>
                <div class="card-subtitle">calories left</div>
            </div>
            <div class="card-content">
                <div class="progress-container">
                    <svg class="progress-ring" viewBox="0 0 100 100">
                        <circle class="progress-ring-bg" cx="50" cy="50" r="40"></circle>
                        <circle class="progress-ring-fill" cx="50" cy="50" r="40" id="caloriesProgress"></circle>
                    </svg>
                    <div class="ring-emoji">🔥</div>
                </div>
        </div>
        

        
        </div>

        <!-- Small Cards Row -->
        <div class="small-cards">
            <!-- Protein Card -->
            <div class="card protein">
                <div class="card-header">
                    <div class="card-value" id="proteinValue">161</div>
                    <div class="card-subtitle">protein left</div>
                </div>
                <div class="card-content">
                    <div class="progress-container">
                        <svg class="progress-ring" viewBox="0 0 100 100">
                            <circle class="progress-ring-bg" cx="50" cy="50" r="40"></circle>
                            <circle class="progress-ring-fill" cx="50" cy="50" r="40" id="proteinProgress"></circle>
                        </svg>
                        <div class="ring-emoji">🍗</div>
                    </div>
            </div>
            </div>

            <!-- Fats Card -->
            <div class="card fats">
                <div class="card-header">
                    <div class="card-value" id="fatsValue">61</div>
                    <div class="card-subtitle">fats left</div>
            </div>
                <div class="card-content">
                    <div class="progress-container">
                        <svg class="progress-ring" viewBox="0 0 100 100">
                            <circle class="progress-ring-bg" cx="50" cy="50" r="40"></circle>
                            <circle class="progress-ring-fill" cx="50" cy="50" r="40" id="fatsProgress"></circle>
                        </svg>
                        <div class="ring-emoji">🥑</div>
            </div>
        </div>
            </div>

            <!-- Carbs Card -->
            <div class="card carbs">
                <div class="card-header">
                    <div class="card-value" id="carbsValue">251</div>
                    <div class="card-subtitle">carbs left</div>
                </div>
                <div class="card-content">
                    <div class="progress-container">
                        <svg class="progress-ring" viewBox="0 0 100 100">
                            <circle class="progress-ring-bg" cx="50" cy="50" r="40"></circle>
                            <circle class="progress-ring-fill" cx="50" cy="50" r="40" id="carbsProgress"></circle>
                        </svg>
                        <div class="ring-emoji">🌾</div>
            </div>
            </div>
            </div>
        </div>
        
    </div>

    <script>
        // Progress ring logic using the simple approach from your reference file
        function setProgress(circle, percent) {
            const radius = circle.r.baseVal.value;
            const circumference = 2 * Math.PI * radius;

            // Set initial state (full ring, no progress)
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            circle.style.strokeDashoffset = circumference;

            // Animate to the target progress after a brief delay
            setTimeout(() => {
                const offset = circumference - (percent * circumference);
                circle.style.strokeDashoffset = offset;
            }, 50);
        }

        class NutritionTracker {
            constructor() {
                // User profile data - goals and consumed amounts
                this.userProfile = {
                    goals: {
                        calories: 2500,
                        protein: 200, // grams
                        carbs: 300,   // grams
                        fats: 80      // grams
                    },
                    consumed: {
                        calories: 301,  // consumed today
                        protein: 39,    // grams consumed
                        carbs: 49,      // grams consumed
                        fats: 19        // grams consumed
                    }
                };

                this.init();
            }
            
            init() {
                this.updateValues();
                this.updateProgressRings();
            }

            // Calculate remaining amounts (goal - consumed)
            getRemaining(nutrient) {
                return Math.max(0, this.userProfile.goals[nutrient] - this.userProfile.consumed[nutrient]);
            }

            // Calculate progress percentage (consumed / goal)
            getProgress(nutrient) {
                return this.userProfile.consumed[nutrient] / this.userProfile.goals[nutrient];
            }

            updateValues() {
                // Update display values to show remaining amounts
                document.getElementById('caloriesValue').textContent = this.getRemaining('calories');
                document.getElementById('proteinValue').textContent = this.getRemaining('protein') + 'g';
                document.getElementById('carbsValue').textContent = this.getRemaining('carbs') + 'g';
                document.getElementById('fatsValue').textContent = this.getRemaining('fats') + 'g';

                // Update subtitles to show remaining amounts
                document.querySelector('.card.calories .card-subtitle').textContent = 'Kcal Left';
                document.querySelector('.card.protein .card-subtitle').textContent = 'Protein Left';
                document.querySelector('.card.carbs .card-subtitle').textContent = 'Carbs Left';
                document.querySelector('.card.fats .card-subtitle').textContent = 'Fats Left';
            }

            updateProgressRings() {
                // Calculate progress based on consumed amounts (consumed / goal)
                const caloriesProgress = this.getProgress('calories');
                const proteinProgress = this.getProgress('protein');
                const carbsProgress = this.getProgress('carbs');
                const fatsProgress = this.getProgress('fats');

                // Update each ring using the simple logic
                const caloriesCircle = document.getElementById('caloriesProgress');
                const proteinCircle = document.getElementById('proteinProgress');
                const carbsCircle = document.getElementById('carbsProgress');
                const fatsCircle = document.getElementById('fatsProgress');

                // Initialize rings to 0 progress first, then animate to actual values
                setProgress(caloriesCircle, 0);
                setProgress(proteinCircle, 0);
                setProgress(carbsCircle, 0);
                setProgress(fatsCircle, 0);

                // Animate to actual progress values with delays
                setTimeout(() => setProgress(caloriesCircle, caloriesProgress), 200);
                setTimeout(() => setProgress(proteinCircle, proteinProgress), 400);
                setTimeout(() => setProgress(carbsCircle, carbsProgress), 600);
                setTimeout(() => setProgress(fatsCircle, fatsProgress), 800);
            }

            // Method to update user profile data (for future integration with backend)
            updateUserProfile(newConsumed) {
                this.userProfile.consumed = { ...this.userProfile.consumed, ...newConsumed };
                this.updateValues();
                this.updateProgressRings();
            }
        }

        // Initialize the app
        let nutritionTracker;

        document.addEventListener('DOMContentLoaded', () => {
            nutritionTracker = new NutritionTracker();
        });

        // Example: Simulate real-time updates (for demo purposes)
        // In production, this would come from your backend API
        setTimeout(() => {
            if (nutritionTracker) {
                // Simulate consuming some food
                nutritionTracker.updateUserProfile({
                    calories: 450,  // ate 450 more calories
                    protein: 55,    // ate 55g more protein
                    carbs: 70,      // ate 70g more carbs
                    fats: 25        // ate 25g more fats
                });
            }
        }, 4000);

        // Function to update nutrition data from external sources (API, user input, etc.)
        function updateUserNutrition(consumedData) {
            if (nutritionTracker) {
                nutritionTracker.updateUserProfile(consumedData);
            }
        }

        // Example usage:
        // updateUserNutrition({ calories: 500, protein: 60, carbs: 80, fats: 30 });
    </script>
</body>
</html>
