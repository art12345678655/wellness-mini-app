<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutrition Tracking App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #f8f8f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            border-radius: 16px;
            padding: 18px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }

        /* Glowing effects for each card */
        .card.calories {
            background: #0D0D0D;
            color: white;
            box-shadow: 
                0 6px 20px rgba(0, 0, 0, 0.1),
                0 0 15px rgba(13, 13, 13, 0.25),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 12px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card.calories .card-value {
            font-size: 32px;
            margin-bottom: 1px;
        }

        .card.calories .card-subtitle {
            font-size: 10px;
        }

        .card.calories .card-header {
            margin-bottom: 0;
        }

        .card.calories .progress-container {
            width: 60px;
            height: 60px;
        }

        /* Override conflicting styles */
        .card.calories .card-value {
            font-size: 32px !important;
        }

        .card.calories .progress-container {
            width: 60px !important;
            height: 60px !important;
        }

        .card.protein {
            background: #a3bffb;
            color: #1a1a1a;
            box-shadow: 
                0 6px 20px rgba(0, 0, 0, 0.1),
                0 0 15px rgba(150, 184, 255, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .card.carbs {
            background: #a7ffd7;
            color: #1a1a1a;
            box-shadow: 
                0 6px 20px rgba(0, 0, 0, 0.1),
                0 0 15px rgba(167, 199, 150, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .card.fats {
            background: #ffcd98;
            color: #1a1a1a;
            box-shadow: 
                0 6px 20px rgba(0, 0, 0, 0.1),
                0 0 15px rgba(249, 254, 134, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        .card-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            opacity: 0.9;
        }

        .card-value {
            font-size: 38px;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 4px;
        }

        .card.calories .card-value {
            font-size: 42px;
        }

        .card-subtitle {
            font-size: 11px;
            font-weight: 400;
            opacity: 0.7;
            text-transform: capitalize;
        }

        .card-content {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
        }

        .card.protein .card-content,
        .card.carbs .card-content,
        .card.fats .card-content {
            justify-content: center;
        }

        .progress-container {
            position: relative;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .card.calories .progress-container {
            width: 60px;
            height: 60px;
        }

        .progress-ring {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .progress-ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.2);
            stroke-width: 6;
            stroke-linecap: round;
        }

        .card.protein .progress-ring-bg,
        .card.carbs .progress-ring-bg,
        .card.fats .progress-ring-bg {
            stroke: rgba(0, 0, 0, 0.1);
        }

        .progress-ring-fill {
            fill: none;
            stroke: white;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 0 100;
            transition: stroke-dasharray 1s ease-in-out;
        }

        .card.protein .progress-ring-fill,
        .card.carbs .progress-ring-fill,
        .card.fats .progress-ring-fill {
            stroke: #1a1a1a;
        }

        .small-cards {
            display: flex;
            gap: 12px;
            justify-content: space-between;
        }

        .card.protein,
        .card.carbs,
        .card.fats {
            padding: 15px;
            flex: 1;
        }

        /* Mobile adjustments for nutrition cards */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }
            
            .container {
                gap: 12px;
            }
            
            .card {
                padding: 15px;
                border-radius: 14px;
            }
            
            .card.calories {
                padding: 10px;
                height: 90px;
            }
            
            .small-cards {
                gap: 10px;
            }
            
            .card-value {
                font-size: 32px;
            }
            
            .card.calories .card-value {
                font-size: 36px;
            }
            
            .card.protein .card-value,
            .card.carbs .card-value,
            .card.fats .card-value {
                font-size: 22px;
            }
            
            .progress-container {
                width: 40px;
                height: 40px;
            }

            .card.calories .progress-container {
                width: 50px;
                height: 50px;
            }
            
            .progress-ring-bg,
            .progress-ring-fill {
                stroke-width: 5;
            }
        }

        /* Start progress rings from top (12 o'clock position) */
        .progress-ring {
            transform: rotate(-90deg);
        }

        .progress-ring-fill {
            transition: stroke-dashoffset 1s ease-out;
        }

        /* Emoji styling inside rings */
        .ring-emoji {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            z-index: 10;
            pointer-events: none;
        }

            font-size: 22px;
        }

        /* Smaller emoji for nutrition rings */
        .card.protein .ring-emoji,
        .card.fats .ring-emoji,
        .card.carbs .ring-emoji {
            font-size: 14px;
        }

        /* Analytics Chart Styles */

            padding: 18px;

            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 15px;
            text-align: center;
        }

        .chart-container {

            margin-bottom: 15px;
            overflow: visible;
            padding: 30px 15px 90px 15px;
        }

        .chart-svg {
            width: 100%;
            height: 240px;
            position: absolute;
            top: 15px;
            left: 0;
            z-index: 1;
            max-height: calc(100% - 150px);
        }

        .calorie-line {
            stroke: #00ff00;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 6px rgba(0, 255, 0, 0.7));
        }

        .deficit-line {
            stroke: #ff0000;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 6px rgba(255, 0, 0, 0.7));
        }

        .result-line {
            stroke: #00ffff;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 6px rgba(0, 255, 255, 0.7));
        }

        .calorie-dot-svg {
            fill: #00ffff;
            stroke: white;
            stroke-width: 2;
            filter: drop-shadow(0 0 6px rgba(0, 255, 255, 0.7));
        }

        /* Updated styles for day container and rings */
        .day-container {
            position: absolute;
            bottom: 15px;
            left: 0;
            right: 0;
            height: 80px;
            z-index: 10;
        }

        .day-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: absolute;
            height: 100%;
            justify-content: flex-end;
            transform: translateX(-50%);
        }

        .nutrition-rings {
            position: relative;
            width: 36px;
            height: 36px;
            margin-bottom: 6px;
            z-index: 15;
        }

        .ring-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .ring-bg {
            fill: none;
            stroke: #f3f4f6;
            stroke-width: 4;
        }

        .ring-protein {
            fill: none;
            stroke: #a3bffb;
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dasharray 0.8s ease;
        }

        .ring-fats {
            fill: none;
            stroke: #ffcd98;
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dasharray 0.8s ease;
        }

        .ring-carbs {
            fill: none;
            stroke: #a7ffd7;
            stroke-width: 4;
            stroke-linecap: round;
            transition: stroke-dasharray 0.8s ease;
        }

        .day-label {
            font-size: 11px;
            font-weight: 500;
            color: #6b7280;
            text-align: center;
            margin-top: 4px;
            margin-bottom: 0;
            z-index: 15;
        }

        /* Responsive adjustments for analytics */
        @media (max-width: 480px) {
            .analytics-container {
                padding: 14px;
                margin-top: 12px;
            }
            
            .chart-container {
                height: 320px;
                padding: 20px 12px 70px 12px;
            }
            
            .chart-svg {
                height: 200px;
                top: 12px;
            }
            
            .nutrition-rings {
                width: 32px;
                height: 32px;
                margin-bottom: 5px;
            }
            
            .day-label {
                font-size: 10px;
            }
            
            .analytics-title {
                font-size: 15px;
                margin-bottom: 12px;
            }
        }
    </style>

    <!-- Telegram WebApp Script -->

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();

        // Get user data from Telegram
        let telegramUserId = null;
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            telegramUserId = tg.initDataUnsafe.user.id;
            console.log('Telegram User ID:', telegramUserId);

            // Update USER_CONFIG with Telegram user ID if available
            if (window.USER_CONFIG && telegramUserId) {
                window.USER_CONFIG.userId = telegramUserId.toString();
            }
        }

        // Expand the app to full height
        tg.expand();
    </script>

    <script>
        // Progress ring logic using the simple approach from your reference file
        function setProgress(circle, percent) {
            const radius = circle.r.baseVal.value;
            const circumference = 2 * Math.PI * radius;

            // Set initial state (full ring, no progress)
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            circle.style.strokeDashoffset = circumference;

            // Animate to the target progress after a brief delay
            setTimeout(() => {
                const offset = circumference - (percent * circumference);
                circle.style.strokeDashoffset = offset;
            }, 50);
        }

        class NutritionTracker {
            constructor() {
                // User profile data - will be loaded from API
                this.userProfile = {
                    goals: {
                        calories: 2500,
                        protein: 200, // grams
                        carbs: 300,   // grams
                        fats: 80      // grams
                    },
                    consumed: {
                        calories: 301,  // consumed today
                        protein: 39,    // grams consumed
                        carbs: 49,      // grams consumed
                        fats: 19        // grams consumed
                    }
                };

                this.isInitialized = false;
                this.init();
            }

            async init() {
                if (this.isInitialized) {
                    console.log('Already initialized, skipping');
                    return;
                }

                await this.loadUserData();
                this.updateValues();
                this.updateProgressRings();
                this.isInitialized = true;
                console.log('Data loaded and stable - no more changes');
            }

            // Load user data from backend API
            async loadUserData() {
                try {
                    // Use Telegram user ID if available, otherwise fall back to URL parameter or default
                    let userId = 'user_123';

                    if (telegramUserId) {
                        userId = telegramUserId.toString();
                    } else if (USER_CONFIG && USER_CONFIG.userId) {
                        userId = USER_CONFIG.userId;
                    }

                    const apiUrl = USER_CONFIG ? `${USER_CONFIG.apiBaseUrl}/api/nutrition-data?user_id=${userId}` : `/api/nutrition-data?user_id=${userId}`;

                    console.log('Fetching data for user ID:', userId);
                    const response = await fetch(apiUrl);
                    const data = await response.json();

                    // Update user profile with real data
                    this.userProfile.goals = {
                        calories: data.targets.calories,
                        protein: data.targets.protein_g,
                        carbs: data.targets.carbs_g,
                        fats: data.targets.fats_g
                    };

                    this.userProfile.consumed = {
                        calories: data.consumed_today.calories,
                        protein: data.consumed_today.protein_g,
                        carbs: data.consumed_today.carbs_g,
                        fats: data.consumed_today.fats_g
                    };

                    console.log('Loaded user data:', data);
                } catch (error) {
                    console.error('Failed to load user data:', error);
                    // Keep default values if API fails
                }
            }

            // Calculate remaining amounts (goal - consumed)
            getRemaining(nutrient) {
                return Math.max(0, this.userProfile.goals[nutrient] - this.userProfile.consumed[nutrient]);
            }

            // Calculate progress percentage (consumed / goal)
            getProgress(nutrient) {
                return this.userProfile.consumed[nutrient] / this.userProfile.goals[nutrient];
            }

            updateValues() {
                if (!this.isInitialized) {
                    return; // Don't update until initialized
                }

                // Update display values to show remaining amounts
                const remainingCalories = Math.round(this.getRemaining('calories'));
                const remainingProtein = Math.round(this.getRemaining('protein'));
                const remainingCarbs = Math.round(this.getRemaining('carbs'));
                const remainingFats = Math.round(this.getRemaining('fats'));

                document.getElementById('caloriesValue').textContent = remainingCalories;
                document.getElementById('proteinValue').textContent = remainingProtein + 'g';
                document.getElementById('carbsValue').textContent = remainingCarbs + 'g';
                document.getElementById('fatsValue').textContent = remainingFats + 'g';

                // Update subtitles - "Kcal Left" for calories, "Left" for others
                document.querySelector('.card.calories .card-subtitle').textContent = 'Kcal Left';
                document.querySelector('.card.protein .card-subtitle').textContent = 'Left';
                document.querySelector('.card.carbs .card-subtitle').textContent = 'Left';
                document.querySelector('.card.fats .card-subtitle').textContent = 'Left';

                console.log('Values updated - stable data:', {
                    calories: remainingCalories,
                    protein: remainingProtein,
                    carbs: remainingCarbs,
                    fats: remainingFats
                });
            }

            updateProgressRings() {
                if (!this.isInitialized) {
                    return; // Don't update until initialized
                }

                // Calculate progress based on consumed amounts (consumed / goal)
                const caloriesProgress = this.getProgress('calories');
                const proteinProgress = this.getProgress('protein');
                const carbsProgress = this.getProgress('carbs');
                const fatsProgress = this.getProgress('fats');

                // Update each ring using the simple logic
                const caloriesCircle = document.getElementById('caloriesProgress');
                const proteinCircle = document.getElementById('proteinProgress');
                const carbsCircle = document.getElementById('carbsProgress');
                const fatsCircle = document.getElementById('fatsProgress');

                // Initialize rings to 0 progress first, then animate to actual values
                setProgress(caloriesCircle, 0);
                setProgress(proteinCircle, 0);
                setProgress(carbsCircle, 0);
                setProgress(fatsCircle, 0);

                // Animate to actual progress values with delays
                setTimeout(() => setProgress(caloriesCircle, caloriesProgress), 200);
                setTimeout(() => setProgress(proteinCircle, proteinProgress), 400);
                setTimeout(() => setProgress(carbsCircle, carbsProgress), 600);
                setTimeout(() => setProgress(fatsCircle, fatsProgress), 800);
            }

            // Method to update user profile data (for future integration with backend)
            updateUserProfile(newConsumed) {
                this.userProfile.consumed = { ...this.userProfile.consumed, ...newConsumed };
                this.updateValues();
                this.updateProgressRings();
            }
        }

        // Initialize the app
        let nutritionTracker;
        let isInitialized = false;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!isInitialized) {
                isInitialized = true;
                nutritionTracker = new NutritionTracker();
                await nutritionTracker.init();
                console.log('Nutrition tracker initialized with stable data');
            }
        });

        // Function to update nutrition data from external sources (API, user input, etc.)
        function updateUserNutrition(consumedData) {
            if (nutritionTracker) {
                nutritionTracker.updateUserProfile(consumedData);
            }
        }

        // Function to refresh data from API (disabled for stability)
        async function refreshNutritionData() {
            if (nutritionTracker && nutritionTracker.isInitialized) {
                console.log('Refresh disabled - data should remain stable');
                // await nutritionTracker.loadUserData();
                // nutritionTracker.updateValues();
                // nutritionTracker.updateProgressRings();
            }
        }

        // Auto-refresh disabled - data should remain stable
        // setInterval(refreshNutritionData, 5 * 60 * 1000);

        // ========================================
        // ANALYTICS CHART FUNCTIONALITY
        // ========================================
        
        // Manual variables for 7 days - modify these values
        const DAILY_NORM = 2400;
        const CALORIES_CONSUMED = [2800, 1900, 2600, 2900, 5600, 2500, 2100]; // Green line values
        const CALORIES_SPENT = [1000, 800, 700, 500, 300, 100, 400]; // Red line values
        
        // Calculate cyan values (consumed - spent)
        const CALORIES_DIFFERENCE = CALORIES_CONSUMED.map((consumed, index) => consumed - CALORIES_SPENT[index]);
        
        // Chart settings
        const CHART_SETTINGS = {
            svgWidth: 800,
            svgHeight: 300,
            normLineY: 150,
            calorieScale: 0.05,
            maxChartHeight: 400
        };

        // Function to position cyan line based on net calorie balance
        function getCyanYPosition(consumed, spent) {
            const netBalance = consumed - spent;
            return CHART_SETTINGS.normLineY - ((netBalance - DAILY_NORM) * CHART_SETTINGS.calorieScale);
        }

        // Function to create smooth path
        function createSmoothPath(points) {
            if (points.length < 2) return '';
            
            let path = `M ${points[0].x},${points[0].y}`;
            
            for (let i = 1; i < points.length; i++) {
                const prevPoint = points[i - 1];
                const currentPoint = points[i];
                
                const dx = currentPoint.x - prevPoint.x;
                const dy = currentPoint.y - prevPoint.y;
                
                const cp1x = prevPoint.x + dx * 0.3;
                const cp1y = prevPoint.y;
                const cp2x = currentPoint.x - dx * 0.3;
                const cp2y = currentPoint.y;
                
                path += ` C ${cp1x},${cp1y} ${cp2x},${cp2y} ${currentPoint.x},${currentPoint.y}`;
            }
            
            return path;
        }

        // Function to calculate dynamic chart bounds
        function calculateChartBounds() {
            const allYValues = [];
            
            for (let i = 0; i < 7; i++) {
                const greenY = CHART_SETTINGS.normLineY - ((CALORIES_CONSUMED[i] - DAILY_NORM) * CHART_SETTINGS.calorieScale);
                const redY = CHART_SETTINGS.normLineY + (CALORIES_SPENT[i] * CHART_SETTINGS.calorieScale);
                const cyanY = getCyanYPosition(CALORIES_CONSUMED[i], CALORIES_SPENT[i]);
                
                allYValues.push(greenY, redY, cyanY);
            }
            
            const minY = Math.min(...allYValues);
            const maxY = Math.max(...allYValues);
            
            const padding = 20;
            let chartMinY = minY - padding;
            let chartMaxY = maxY + padding;
            
            const maxHeight = CHART_SETTINGS.maxChartHeight;
            const currentHeight = chartMaxY - chartMinY;
            
            if (currentHeight > maxHeight) {
                const centerY = CHART_SETTINGS.normLineY;
                chartMinY = centerY - (maxHeight / 2);
                chartMaxY = centerY + (maxHeight / 2);
            }
            
            return { minY: chartMinY, maxY: chartMaxY };
        }

        // Function to plot the lines
        function plotLines() {
            const svg = document.querySelector('.chart-svg');
            const dayColumns = document.querySelectorAll('.day-column');
            
            if (!svg || !dayColumns.length) return;
            
            const bounds = calculateChartBounds();
            const chartHeight = bounds.maxY - bounds.minY;
            const viewBoxHeight = Math.max(200, chartHeight);
            svg.setAttribute('viewBox', `0 ${bounds.minY} 800 ${viewBoxHeight}`);
            
            const container = document.querySelector('.chart-container');
            container.style.height = '380px';
            
            // Calculate X positions evenly distributed across the chart width (same as curve dots)
            const svgPositions = [];
            for (let i = 0; i < 7; i++) {
                const x = (CHART_SETTINGS.svgWidth / 6) * i; // Distribute evenly across 800px width
                svgPositions.push(x);
            }
            
            // Convert SVG positions to relative positions for day columns
            const svgRect = svg.getBoundingClientRect();
            const dayPositions = svgPositions.map(pos => (pos / CHART_SETTINGS.svgWidth) * svgRect.width);
            
            const greenPoints = [];
            const redPoints = [];
            const cyanPoints = [];
            
            for (let i = 0; i < 7; i++) {
                const x = svgPositions[i];
                
                const greenY = CHART_SETTINGS.normLineY - ((CALORIES_CONSUMED[i] - DAILY_NORM) * CHART_SETTINGS.calorieScale);
                const redY = CHART_SETTINGS.normLineY + (CALORIES_SPENT[i] * CHART_SETTINGS.calorieScale);
                const cyanY = getCyanYPosition(CALORIES_CONSUMED[i], CALORIES_SPENT[i]);
                
                greenPoints.push({x, y: greenY});
                redPoints.push({x, y: redY});
                cyanPoints.push({x, y: cyanY});
            }
            
            const calorieLine = svg.querySelector('.calorie-line');
            const deficitLine = svg.querySelector('.deficit-line');
            const resultLine = svg.querySelector('.result-line');
            
            if (calorieLine) calorieLine.setAttribute('d', createSmoothPath(greenPoints));
            if (deficitLine) deficitLine.setAttribute('d', createSmoothPath(redPoints));
            if (resultLine) resultLine.setAttribute('d', createSmoothPath(cyanPoints));
            
            const dots = svg.querySelectorAll('.calorie-dot-svg');
            dots.forEach((dot, index) => {
                if (cyanPoints[index]) {
                    dot.setAttribute('cx', cyanPoints[index].x);
                    dot.setAttribute('cy', cyanPoints[index].y);
                }
            });
            
            // Position day columns to align with curve dots
            dayColumns.forEach((column, index) => {
                if (cyanPoints[index]) {
                    // Use the actual X coordinate of the curve dot
                    const dotX = cyanPoints[index].x;
                    
                    // Calculate X position as percentage of SVG width
                    const xPercent = (dotX / 800) * 100; // 800 is the SVG viewBox width
                    
                    column.style.left = `${xPercent}%`;
                }
            });
            
        }

        // Initialize analytics chart
        function initAnalyticsChart() {
            setTimeout(() => {
                plotLines();
            }, 100);
        }

        // Add interactive effects for nutrition rings
        document.addEventListener('DOMContentLoaded', () => {
            initAnalyticsChart();
            
            document.querySelectorAll('.nutrition-rings').forEach(ring => {
                ring.addEventListener('mouseenter', () => {
                    ring.style.transform = 'scale(1.1)';
                    ring.style.transition = 'transform 0.3s ease';
                });

                ring.addEventListener('mouseleave', () => {
                    ring.style.transform = 'scale(1)';
                });
            });
        });

        window.addEventListener('resize', () => {
            plotLines();
        });
    </script>
